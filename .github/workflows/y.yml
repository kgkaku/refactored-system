name: Toffee

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - run: pip install requests pycryptodome
      
      - name: Run script
        env:
          SCRIPT: ${{ secrets.TOFFEE_PY }}
        run: |
          echo "$SCRIPT" | base64 -d > run.py
          python run.py
      
      - name: Commit files
        run: |
          git config user.name "refresh-toffee[bot]"
          git config user.email "bot@refresh.toffee.com"
          git add *.m3u *.json slug.txt 2>/dev/null || true
          git commit -m "Update playlists $(date '+%Y-%m-%d %H:%M')" || exit 0
          git push
